
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>แดชบอร์ดการเข้างาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 50px;
      position: relative;
    }

    body::before {
      content: ''; position: fixed; width: 400px; height: 400px;
      background: #ec4899; border-radius: 50%; filter: blur(120px); opacity: 0.1; top: -100px; left: -100px; z-index: 0;
    }

    .container { width: 100%; max-width: 500px; z-index: 1; display: flex; flex-direction: column; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .btn-back { color: #94a3b8; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; }
    .page-title { font-size: 1.2rem; font-weight: 600; color: #f472b6; }

    /* Filter Section */
    .filter-section {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 20px; margin-bottom: 24px; backdrop-filter: blur(10px);
    }
    .filter-section label { display: block; font-size: 0.95rem; color: #cbd5e1; margin-bottom: 10px; font-weight: 600; }
    
    select {
      width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #475569;
      background: #0f172a; color: #fff; font-size: 1rem; font-family: 'Sarabun', sans-serif;
      appearance: none; cursor: pointer; outline: none;
    }
    select:focus { border-color: #f472b6; }

    /* Stats Summary */
    .stats-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .stat-card {
      flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .stat-value { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
    .stat-label { font-size: 0.85rem; color: #94a3b8; }
    .text-normal { color: #34d399; }
    .text-shift { color: #fbbf24; }

    /* Logs List */
    .logs-container { display: flex; flex-direction: column; gap: 12px; }
    .log-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px; padding: 16px; display: flex; align-items: flex-start; gap: 16px;
      transition: transform 0.2s;
    }
    .log-card:hover { background: rgba(255,255,255,0.08); transform: translateX(4px); }
    
    .log-icon {
      width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; flex-shrink: 0;
    }
    .icon-normal { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .icon-shift { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

    .log-details { flex: 1; }
    .log-time { font-size: 0.95rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .log-type { font-size: 0.85rem; display: inline-block; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; font-weight: 600; }
    .type-normal { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .type-shift { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    
    .log-meta { font-size: 0.85rem; color: #94a3b8; display: flex; flex-direction: column; gap: 2px; }
    .meta-item { display: flex; align-items: center; gap: 6px; }

    .loading-state { text-align: center; padding: 40px 0; color: #94a3b8; }
    .empty-state { text-align: center; padding: 40px 0; color: #64748b; font-style: italic; }
  </style>
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <a href="index.html" class="btn-back">‹ กลับ</a>
      <div class="page-title">📊 แดชบอร์ดการเข้างาน</div>
      <div style="width: 60px;"></div>
    </div>

    <div class="filter-section">
      <label for="userSelect">👤 เลือกชื่อนักศึกษา:</label>
      <select id="userSelect" onchange="filterLogs()">
        <option value="">-- กำลังโหลดรายชื่อ... --</option>
      </select>
    </div>

    <div class="stats-row" id="statsRow" style="display: none;">
      <div class="stat-card">
        <div class="stat-value text-normal" id="statNormal">0</div>
        <div class="stat-label">เข้างานปกติ (ครั้ง)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value text-shift" id="statShift">0</div>
        <div class="stat-label">เข้าเวร (ครั้ง)</div>
      </div>
    </div>

    <div class="logs-container" id="logsContainer">
      <div class="loading-state">⏳ กำลังดึงข้อมูลจากฐานข้อมูล...</div>
    </div>

  </div>

  <script>
    let allLogs = []; // เก็บข้อมูลทั้งหมด
    let uniqueUsers = new Map(); // เก็บรายชื่อคน

    async function fetchData() {
      const apiUrl = getApiUrl();
      if (!apiUrl) {
        document.getElementById('logsContainer').innerHTML = '<div class="empty-state">❌ ไม่พบ API URL กรุณาตั้งค่า</div>';
        return;
      }

      try {
        // ใช้ GET request พร้อมส่ง action=getLogs (ต้องไปแก้ code.gs ด้วย)
        const res = await fetch(`${apiUrl}?action=getLogs`);
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        allLogs = data.logs || [];
        processUsers();
        
      } catch (err) {
        document.getElementById('logsContainer').innerHTML = `<div class="empty-state">❌ ดึงข้อมูลล้มเหลว: ${err.message}</div>`;
      }
    }

    function processUsers() {
      const select = document.getElementById('userSelect');
      uniqueUsers.clear();

      // หารายชื่อที่ไม่ซ้ำกัน
      allLogs.forEach(log => {
        if (log.studentId && log.name) {
          const key = log.studentId;
          if (!uniqueUsers.has(key)) {
            uniqueUsers.set(key, log.name);
          }
        }
      });

      if (uniqueUsers.size === 0) {
        select.innerHTML = '<option value="">-- ไม่มีข้อมูลในระบบ --</option>';
        document.getElementById('logsContainer').innerHTML = '<div class="empty-state">ยังไม่มีใครบันทึกการเข้างานเลย</div>';
        return;
      }

      // สร้าง Option ใน Dropdown
      let optionsHtml = '<option value="ALL">ดูทั้งหมดทุกคน</option>';
      uniqueUsers.forEach((name, id) => {
        optionsHtml += `<option value="${id}">${name} (${id})</option>`;
      });
      
      select.innerHTML = optionsHtml;
      
      // แสดงข้อมูลเริ่มต้น (ทั้งหมด)
      filterLogs(); 
    }

    function filterLogs() {
      const selectedId = document.getElementById('userSelect').value;
      const container = document.getElementById('logsContainer');
      const statsRow = document.getElementById('statsRow');
      
      if (!selectedId) return;

      statsRow.style.display = 'flex';
      let filtered = [];
      let countNormal = 0;
      let countShift = 0;

      if (selectedId === 'ALL') {
        filtered = allLogs;
      } else {
        filtered = allLogs.filter(log => log.studentId === selectedId);
      }

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">ไม่มีประวัติการเข้างาน</div>';
        document.getElementById('statNormal').innerText = 0;
        document.getElementById('statShift').innerText = 0;
        return;
      }

      let html = '';
      filtered.forEach(log => {
        const isShift = log.type === 'เข้าเวร';
        if (isShift) countShift++; else countNormal++;

        const iconClass = isShift ? 'icon-shift' : 'icon-normal';
        const iconEmoji = isShift ? '🏥' : '📷';
        const typeClass = isShift ? 'type-shift' : 'type-normal';
        
        let detailHtml = '';
        if (isShift && log.detail && log.detail !== '-') {
          detailHtml = `<div class="meta-item">👨‍⚕️ อ.แพทย์: ${log.detail}</div>`;
        }

        let nameHtml = selectedId === 'ALL' ? `<div class="meta-item">👤 ${log.name}</div>` : '';

        html += `
          <div class="log-card">
            <div class="log-icon ${iconClass}">${iconEmoji}</div>
            <div class="log-details">
              <div class="log-time">🕒 ${log.timestamp}</div>
              <div class="log-type ${typeClass}">${log.type}</div>
              <div class="log-meta">
                ${nameHtml}
                <div class="meta-item">📍 ${log.location}</div>
                ${detailHtml}
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      document.getElementById('statNormal').innerText = countNormal;
      document.getElementById('statShift').innerText = countShift;
    }

    // เริ่มโหลดข้อมูลทันทีที่เปิดหน้าเว็บ
    window.onload = fetchData;
  </script>

</body>
</html>

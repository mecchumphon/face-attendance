<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ประวัติการเข้างาน / เข้าเวร</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <!-- เพิ่ม Library สำหรับจัดการไฟล์ Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 50px;
      position: relative;
    }

    body::before {
      content: ''; position: fixed; width: 400px; height: 400px;
      background: #3b82f6; border-radius: 50%; filter: blur(120px);
      opacity: 0.1; top: -100px; right: -100px; pointer-events: none; z-index: 0;
    }

    .page-wrap {
      width: 100%; max-width: 560px; position: relative; z-index: 1;
      animation: fadeIn 0.5s ease;
    }

    /* Header */
    .top-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 20px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #64748b; text-decoration: none; font-size: 0.85em;
      padding: 6px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.25s ease;
    }
    .back-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.1); }
    h2 { font-size: 1.2em; font-weight: 600; color: #93c5fd; }
    .spacer { width: 70px; }

    /* Stats Area */
    .stats-area {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .stat-card {
      flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 12px; text-align: center;
    }
    .stat-value { font-size: 1.5em; font-weight: 700; color: #e2e8f0; margin-bottom: 4px; }
    .stat-label { font-size: 0.75em; color: #94a3b8; }
    
    .text-green { color: #34d399; }
    .text-yellow { color: #fde047; }

    /* Search & Action Area */
    .action-container {
      display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;
    }
    .search-box {
      width: 100%; padding: 14px 18px; border-radius: 16px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-family: 'Sarabun', sans-serif; font-size: 15px;
      outline: none; transition: all 0.3s ease;
    }
    .search-box:focus {
      border-color: #60a5fa; background: rgba(255,255,255,0.1);
      box-shadow: 0 0 15px rgba(96,165,250,0.2);
    }
    .search-box::placeholder { color: #64748b; }

    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-action {
      padding: 12px; border-radius: 12px;
      font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-toggle {
      background: rgba(96,165,250,0.1); border: 1px dashed rgba(96,165,250,0.4);
      color: #93c5fd;
    }
    .btn-toggle:hover { background: rgba(96,165,250,0.2); border-style: solid; }

    .btn-download {
      background: rgba(16,185,129,0.1); border: 1px dashed rgba(16,185,129,0.4);
      color: #34d399;
    }
    .btn-download:hover { background: rgba(16,185,129,0.2); border-style: solid; }

    /* Logs Container */
    #logsContainer { display: flex; flex-direction: column; gap: 12px; }
    
    .log-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 10px;
      transition: transform 0.2s;
    }
    .log-card:not(.summary-card):hover { transform: translateY(-2px); background: rgba(255,255,255,0.08); }

    /* Summary Card Specific (Clickable) */
    .summary-card { cursor: pointer; border: 1px solid rgba(255,255,255,0.12); }
    .summary-card:hover {
      transform: translateY(-3px);
      background: rgba(59,130,246,0.1);
      border-color: rgba(96,165,250,0.5);
      box-shadow: 0 4px 15px rgba(59,130,246,0.2);
    }
    .click-hint { font-size: 0.75em; color: #60a5fa; text-align: center; margin-top: 12px; font-weight: 600; }

    .log-header { display: flex; justify-content: space-between; align-items: center; }
    .log-type {
      font-size: 0.8em; font-weight: 600; padding: 4px 10px; border-radius: 20px;
    }
    .type-normal { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .type-shift { background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.3); }
    .type-total { background: rgba(255,255,255,0.1); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.2); }
    
    .log-time { font-size: 0.85em; color: #cbd5e1; font-weight: 600; }
    
    .log-body { display: flex; flex-direction: column; gap: 4px; }
    .log-name { font-size: 1.1em; font-weight: 700; color: #f1f5f9; }
    .log-id { font-size: 0.85em; color: #94a3b8; }
    .log-loc { font-size: 0.85em; color: #94a3b8; display: flex; align-items: center; gap: 6px; margin-top: 4px;}

    /* Daily Summary Specific */
    .sum-date { font-size: 1.1em; font-weight: 700; color: #60a5fa; }
    .sum-row { display: flex; justify-content: space-between; margin-top: 8px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
    .sum-item { display: flex; align-items: center; gap: 6px; font-size: 0.9em; font-weight: 600; }

    .loading { text-align: center; color: #94a3b8; padding: 40px 0; font-size: 0.9em; }
    .no-data { text-align: center; color: #ef4444; padding: 20px; background: rgba(239,68,68,0.1); border-radius: 12px; margin-top: 20px;}

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับ</a>
    <h2>📋 ประวัติการเข้างาน</h2>
    <div class="spacer"></div>
  </div>

  <div class="stats-area">
    <div class="stat-card">
      <div class="stat-value text-green" id="countNormal">0</div>
      <div class="stat-label">เข้างานปกติ</div>
    </div>
    <div class="stat-card">
      <div class="stat-value text-yellow" id="countShift">0</div>
      <div class="stat-label">เข้าเวร</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="countTotal">0</div>
      <div class="stat-label">รวมทั้งหมด</div>
    </div>
  </div>

  <div class="action-container">
    <input type="text" id="searchInput" class="search-box" placeholder="🔍 ค้นหา รหัสนักศึกษา, ชื่อ หรือ วันที่..." onkeyup="filterLogs()">
    <div class="button-group">
      <button id="btnToggle" class="btn-action btn-toggle" onclick="toggleView()">📄 แสดงรายละเอียด</button>
      <button id="btnExport" class="btn-action btn-download" onclick="exportToExcel()">📊 ดาวน์โหลด Excel</button>
    </div>
  </div>

  <div id="logsContainer">
    <div class="loading">⏳ กำลังโหลดข้อมูลประวัติจากระบบ...</div>
  </div>
</div>

<script>
  const BACKUP_API_URL = "https://script.google.com/macros/s/AKfycbwcP4hjqvJqyLtbXhd4ifwusSVSB_Y7TP9uYUW6_LSKCzd920_Wv8BRWzH7FmqmHZRmBQ/exec";
  const API_URL = (typeof GAS_API_URL !== 'undefined' && GAS_API_URL) ? GAS_API_URL : BACKUP_API_URL;
  
  let allLogs = [];
  let currentFilteredLogs = [];
  let isSummaryMode = true; 

  window.onload = function() {
    fetchLogs();
  };

  async function fetchLogs() {
    const container = document.getElementById('logsContainer');
    try {
      const response = await fetch(API_URL + '?action=getLogs');
      const data = await response.json();
      
      if (data.success && data.logs) {
        allLogs = data.logs; 
        currentFilteredLogs = [...allLogs];
        filterLogs(); 
      } else {
        container.innerHTML = '<div class="no-data">❌ ไม่พบข้อมูลประวัติ หรือเกิดข้อผิดพลาด</div>';
      }
    } catch (error) {
      container.innerHTML = `<div class="no-data">❌ ไม่สามารถดึงข้อมูลได้: ${error.message}</div>`;
    }
  }

  function updateStats(logs) {
    let normal = 0, shift = 0;
    logs.forEach(log => {
      if (log.type === 'เข้าเวร') shift++;
      else normal++;
    });
    document.getElementById('countNormal').innerText = normal;
    document.getElementById('countShift').innerText = shift;
    document.getElementById('countTotal').innerText = logs.length;
  }

  function toggleView() {
    isSummaryMode = !isSummaryMode;
    document.getElementById('searchInput').value = ''; 
    filterLogs();
  }

  function viewDateDetails(dateStr) {
    document.getElementById('searchInput').value = dateStr;
    filterLogs();
  }

  function renderDailySummary(logs) {
    const container = document.getElementById('logsContainer');
    container.innerHTML = '';
    if (logs.length === 0) {
      container.innerHTML = '<div class="loading">ไม่พบข้อมูลประวัติ</div>';
      return;
    }
    const dates = [];
    const grouped = {};
    logs.forEach(log => {
      const dateStr = log.timestamp.split(' ')[0]; 
      if (!grouped[dateStr]) {
        grouped[dateStr] = { normal: 0, shift: 0, total: 0 };
        dates.push(dateStr);
      }
      if (log.type === 'เข้าเวร') grouped[dateStr].shift++;
      else grouped[dateStr].normal++;
      grouped[dateStr].total++;
    });
    dates.forEach(date => {
      const data = grouped[date];
      const card = document.createElement('div');
      card.className = 'log-card summary-card';
      card.onclick = () => viewDateDetails(date);
      card.innerHTML = `
        <div class="log-header">
          <span class="sum-date">📅 วันที่ ${date}</span>
          <span class="log-type type-total">รวม ${data.total} รายการ</span>
        </div>
        <div class="sum-row">
          <div class="sum-item text-green">☀️ ปกติ: ${data.normal}</div>
          <div class="sum-item text-yellow">🌙 เข้าเวร: ${data.shift}</div>
        </div>
        <div class="click-hint">👆 คลิ๊กเพื่อดูรายชื่อของวันนี้</div>
      `;
      container.appendChild(card);
    });
  }

  function renderLogs(logs) {
    const container = document.getElementById('logsContainer');
    container.innerHTML = '';
    if (logs.length === 0) {
      container.innerHTML = '<div class="loading">ไม่พบข้อมูลที่ค้นหา</div>';
      return;
    }
    logs.forEach(log => {
      const isShift = log.type === 'เข้าเวร';
      const typeClass = isShift ? 'type-shift' : 'type-normal';
      const typeIcon = isShift ? '🌙' : '☀️';
      const card = document.createElement('div');
      card.className = 'log-card';
      card.innerHTML = `
        <div class="log-header">
          <span class="log-type ${typeClass}">${typeIcon} ${log.type}</span>
          <span class="log-time">🕒 ${log.timestamp}</span>
        </div>
        <div class="log-body">
          <div class="log-name">👤 ${log.name}</div>
          <div class="log-id">💳 รหัส: ${log.studentId}</div>
          <div class="log-loc">📍 สถานที่: ${log.location}</div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function filterLogs() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (query === '') {
      currentFilteredLogs = [...allLogs];
      updateStats(allLogs);
      if (isSummaryMode) {
        document.getElementById('btnToggle').innerText = '📄 แสดงรายละเอียด';
        renderDailySummary(allLogs);
      } else {
        document.getElementById('btnToggle').innerText = '📅 หน้าสรุปรายวัน';
        renderLogs(allLogs);
      }
      return;
    }
    currentFilteredLogs = allLogs.filter(log => {
      return log.name.toLowerCase().includes(query) || 
             String(log.studentId).toLowerCase().includes(query) ||
             log.location.toLowerCase().includes(query) ||
             log.timestamp.toLowerCase().includes(query);
    });
    updateStats(currentFilteredLogs);
    renderLogs(currentFilteredLogs);
  }

  // ฟังก์ชันดาวน์โหลด Excel
  function exportToExcel() {
    if (currentFilteredLogs.length === 0) {
      alert('ไม่มีข้อมูลให้ดาวน์โหลด');
      return;
    }

    const confirmExport = confirm(`ต้องการดาวน์โหลดข้อมูลจำนวน ${currentFilteredLogs.length} รายการ เป็นไฟล์ Excel ใช่หรือไม่?`);
    if (!confirmExport) return;

    // เตรียมข้อมูลสำหรับ Excel
    const excelData = currentFilteredLogs.map(log => ({
      'วันที่/เวลา': log.timestamp,
      'ประเภท': log.type,
      'รหัสนักศึกษา': log.studentId,
      'ชื่อ-นามสกุล': log.name,
      'สถานที่/วอร์ด': log.location
    }));

    // สร้าง Workbook และ Worksheet
    const worksheet = XLSX.utils.json_to_sheet(excelData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "AttendanceHistory");

    // ปรับความกว้างคอลัมน์อัตโนมัติ
    const wscols = [
      {wch: 25}, // วันที่
      {wch: 15}, // ประเภท
      {wch: 15}, // รหัส
      {wch: 25}, // ชื่อ
      {wch: 30}  // สถานที่
    ];
    worksheet['!cols'] = wscols;

    // ดาวน์โหลดไฟล์
    const fileName = `Attendance_Report_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(workbook, fileName);
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตั้งค่าระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: #06b6d4;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.08;
      top: -100px; right: -100px;
      pointer-events: none; z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 500px;
      position: relative; z-index: 1;
      animation: fadeIn 0.5s ease;
    }

    /* Header */
    .page-header { margin-bottom: 24px; position: relative; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #64748b; text-decoration: none; font-size: 0.88em;
      padding: 6px 12px; border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.25s ease;
      margin-bottom: 14px;
      cursor: pointer;
    }
    .back-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.1); }
    
    .logout-btn {
      position: absolute;
      right: 0; top: 0;
      color: #f87171;
    }

    h2 {
      font-size: 1.6em; font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .page-subtitle { font-size: 0.83em; color: #64748b; }

    /* Card */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px 22px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      margin-bottom: 16px;
      position: relative;
    }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .section-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .section-icon.cyan    { background: rgba(6,182,212,0.2);  }
    .section-title-text { font-weight: 600; font-size: 0.95em; color: #c7d2fe; }

    /* Inputs */
    label {
      display: block; font-size: 0.82em; font-weight: 600;
      color: #94a3b8; margin-bottom: 6px; letter-spacing: 0.03em;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      outline: none;
      transition: all 0.3s ease;
      margin-bottom: 14px;
    }
    input:focus {
      border-color: rgba(99,102,241,0.5);
      background: rgba(99,102,241,0.07);
    }
    .note {
      font-size: 0.78em; color: #475569;
      margin-top: -10px; margin-bottom: 14px; line-height: 1.5;
    }

    /* Buttons */
    .btn {
      border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 600;
      padding: 13px; width: 100%;
      transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-get-loc {
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      color: white; margin-bottom: 14px; font-size: 13px; padding: 10px;
    }
    .btn-save {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; box-shadow: 0 4px 20px rgba(16,185,129,0.3);
      font-size: 16px; padding: 15px; margin-top: 10px;
    }
    .btn-add {
      background: rgba(59, 130, 246, 0.2);
      border: 1px dashed #3b82f6; color: #93c5fd;
      margin-bottom: 20px;
    }
    .btn-add:hover { background: rgba(59, 130, 246, 0.3); }
    .btn-login { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; margin-top: 10px; }
    
    .btn-delete {
      position: absolute; top: 20px; right: 20px;
      color: #f87171; background: none; border: none; 
      font-family: 'Sarabun'; cursor: pointer; font-size: 13px; font-weight: bold;
    }

    .btn-back {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px; width: 100%; border-radius: 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: #64748b; font-size: 15px; font-weight: 600;
      font-family: 'Sarabun', sans-serif; text-decoration: none; margin-top: 10px;
    }

    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    #msg, #loginMsg {
      margin-top: 14px; min-height: 22px; font-size: 0.9em; font-weight: 600; text-align: center;
    }
    .msg-success { color: #34d399; }
    .msg-error   { color: #f87171; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<!-- หน้าจอ Login -->
<div class="container" id="loginContainer">
  <div class="page-header" style="text-align: center; margin-bottom: 30px; margin-top: 20px;">
    <h2>🔒 Admin Login</h2>
    <p class="page-subtitle">กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบตั้งค่า</p>
  </div>
  
  <div class="card">
    <label>รหัสผ่านแอดมิน (Password)</label>
    <input type="password" id="adminPwd" placeholder="ใส่รหัสผ่านที่นี่..." onkeypress="if(event.key === 'Enter') checkLogin()">
    <button class="btn btn-login" onclick="checkLogin()">เข้าสู่ระบบ</button>
    <div id="loginMsg"></div>
  </div>
  <a href="index.html" class="btn-back">← กลับเมนูหลัก</a>
</div>

<!-- หน้าจอตั้งค่า -->
<div class="container" id="mainContainer" style="display: none;">
  <div class="page-header">
    <a href="index.html" class="back-btn">← กลับ</a>
    <button onclick="logoutAdmin()" class="back-btn logout-btn">ออกจากระบบ</button>
    <h2>⚙️ ตั้งค่าระบบ</h2>
    <p class="page-subtitle">จัดการจุดเช็คอิน (หลายสาขา/จุด)</p>
  </div>

  <div class="section-header">
    <div class="section-icon cyan">📍</div>
    <span class="section-title-text">พิกัดจุดเช็คอินที่อนุญาต</span>
  </div>

  <!-- จุดที่จะแสดงพิกัดแบบไดนามิก -->
  <div id="locationsContainer"></div>

  <button class="btn btn-add" onclick="addLocation()">
    ➕ เพิ่มจุดเช็คอินใหม่
  </button>

  <button class="btn btn-save" onclick="saveAll()">
    💾 บันทึกการตั้งค่าทั้งหมด
  </button>
  <div id="msg"></div>
</div>

<script>
  // ==========================================
  const ADMIN_PASSWORD = "MECCP1234";
  const BACKUP_API_URL = "https://script.google.com/macros/s/AKfycbwcP4hjqvJqyLtbXhd4ifwusSVSB_Y7TP9uYUW6_LSKCzd920_Wv8BRWzH7FmqmHZRmBQ/exec";

  function getApiUrl() {
    return (typeof GAS_API_URL !== 'undefined' && GAS_API_URL) ? GAS_API_URL : BACKUP_API_URL;
  }
  // ==========================================

  let locations = [];

  const msgDiv = document.getElementById('msg');
  const loginMsgDiv = document.getElementById('loginMsg');
  const loginContainer = document.getElementById('loginContainer');
  const mainContainer = document.getElementById('mainContainer');

  window.onload = function() {
    if (sessionStorage.getItem('isAdminLogged') === 'true') {
      showConfigScreen();
    }
  };

  function checkLogin() {
    const pwd = document.getElementById('adminPwd').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('isAdminLogged', 'true');
      showConfigScreen();
    } else {
      loginMsgDiv.innerText = '❌ รหัสผ่านไม่ถูกต้อง';
      loginMsgDiv.className = 'msg-error';
    }
  }

  function logoutAdmin() {
    sessionStorage.removeItem('isAdminLogged');
    location.reload();
  }

  function showConfigScreen() {
    loginContainer.style.display = 'none';
    mainContainer.style.display = 'block';
    
    const fixedUrl = getApiUrl();
    if (fixedUrl) loadGpsConfig(fixedUrl);
  }

  function loadGpsConfig(apiUrl) {
    showMsg('⏳ กำลังโหลดพิกัดเดิม...', '');
    fetch(apiUrl + '?action=getConfig')
      .then(r => r.json())
      .then(config => {
        showMsg('', '');
        // ตรวจสอบโครงสร้างแบบใหม่ (Array) หรือแบบเก่า
        if (config.locations && Array.isArray(config.locations)) {
          locations = config.locations;
        } else if (config.lat && config.lng) {
          locations = [{ name: 'สาขาหลัก', lat: config.lat, lng: config.lng, radius: config.radius || 0.5 }];
        } else {
          locations = [];
        }
        if(locations.length === 0) addLocation(); // ถ้าว่างให้ขึ้นมา 1 อันอัตโนมัติ
        else renderLocations();
      })
      .catch(() => { 
        showMsg('❌ โหลดข้อมูลไม่สำเร็จ', 'error');
        addLocation(); 
      });
  }

  // ----- จัดการหน้าตาของพิกัด -----
  function renderLocations() {
    const container = document.getElementById('locationsContainer');
    container.innerHTML = '';
    
    locations.forEach((loc, idx) => {
      container.innerHTML += `
        <div class="card">
          <button class="btn-delete" onclick="removeLocation(${idx})">❌ ลบทิ้ง</button>
          
          <label>ชื่อสถานที่ / สาขา</label>
          <input type="text" value="${loc.name || ''}" onchange="updateLoc(${idx}, 'name', this.value)" placeholder="เช่น สำนักงานใหญ่">
          
          <button class="btn btn-get-loc" onclick="getCurrentLocationFor(${idx})">
            📍 ดึงตำแหน่งมือถือใส่จุดนี้
          </button>

          <div class="input-row">
            <div>
              <label>LATITUDE</label>
              <input type="number" step="any" value="${loc.lat || ''}" onchange="updateLoc(${idx}, 'lat', this.value)">
            </div>
            <div>
              <label>LONGITUDE</label>
              <input type="number" step="any" value="${loc.lng || ''}" onchange="updateLoc(${idx}, 'lng', this.value)">
            </div>
          </div>

          <label>รัศมีที่ยอมรับ (กิโลเมตร)</label>
          <input type="number" step="0.01" value="${loc.radius !== undefined ? loc.radius : 0.1}" onchange="updateLoc(${idx}, 'radius', this.value)">
        </div>
      `;
    });
  }

  function updateLoc(idx, field, val) {
    locations[idx][field] = field === 'name' ? val : parseFloat(val);
  }

  function addLocation() {
    locations.push({ name: '', lat: '', lng: '', radius: 0.1 });
    renderLocations();
  }

  function removeLocation(idx) {
    if(confirm('ลบจุดเช็คอินนี้?')) {
      locations.splice(idx, 1);
      renderLocations();
    }
  }

  function getCurrentLocationFor(idx) {
    if (!navigator.geolocation) return alert('Browser นี้ไม่รองรับ Geolocation');
    navigator.geolocation.getCurrentPosition(
      pos => {
        locations[idx].lat = pos.coords.latitude;
        locations[idx].lng = pos.coords.longitude;
        renderLocations();
        alert('✅ ดึงพิกัดเรียบร้อย');
      },
      err => alert('❌ ไม่สามารถดึงตำแหน่งได้: ' + err.message)
    );
  }

  // ----- บันทึก -----
  async function saveAll() {
    const apiUrl = getApiUrl();
    if (!apiUrl) return showMsg('❌ ไม่พบ API URL', 'error');

    if (locations.length === 0) return showMsg('❌ ต้องมีจุดเช็คอินอย่างน้อย 1 จุด', 'error');

    for (let i = 0; i < locations.length; i++) {
      if (!locations[i].lat || !locations[i].lng) {
        return showMsg('❌ กรุณากรอกพิกัดให้ครบทุกจุด', 'error');
      }
    }

    showMsg('⏳ กำลังบันทึก...', '');

    try {
      const res = await fetch(apiUrl, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveConfig', locations: locations })
      });
      const data = await res.json();
      showMsg('✅ ' + (data.message || 'บันทึกสำเร็จ'), 'success');
    } catch (e) {
      showMsg('❌ เชื่อมต่อ API ไม่ได้: ' + e.message, 'error');
    }
  }

  function showMsg(text, type) {
    msgDiv.innerText = text;
    msgDiv.className = type === 'success' ? 'msg-success' : type === 'error' ? 'msg-error' : '';
  }
</script>
</body>
</html>
